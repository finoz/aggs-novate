services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      APACHE_RUN_USER: "#1000"
      APACHE_RUN_GROUP: "#1000"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: aggsnovate
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ularavel", "-plaravel_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
