name: Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, xml, zip

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy app files → /home/otlfvjov/ (non tocca .env, storage/, né public_html/)
      - name: Deploy Laravel app
        run: |
          tar czf /tmp/app.tar.gz \
            app/ bootstrap/ config/ database/ resources/ routes/ vendor/ \
            artisan composer.json composer.lock
          scp /tmp/app.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/otlfvjov/
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd /home/otlfvjov && tar xzf app.tar.gz && rm app.tar.gz"

      # Deploy public/ → public_html/ (web root, incluso public/build/)
      - name: Deploy public files
        run: |
          tar czf /tmp/public.tar.gz -C public .
          scp /tmp/public.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/otlfvjov/public_html/
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd /home/otlfvjov/public_html && tar xzf public.tar.gz && rm public.tar.gz"
